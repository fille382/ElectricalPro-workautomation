<!DOCTYPE html>
<html>
<head><title>Loggar in...</title></head>
<body>
<p>Loggar in...</p>
<script>
  // Google redirects here with ?code=...&state=...
  // Store in localStorage so the parent window can pick it up
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  var state = params.get('state');

  if (code) {
    // Store result in localStorage - parent window polls for this
    localStorage.setItem('pb_oauth_result', JSON.stringify({
      code: code,
      state: state
    }));
    document.body.innerHTML = '<p>Inloggning lyckades! Fönstret stängs...</p>';
    setTimeout(function() { window.close(); }, 1000);
  } else {
    document.body.innerHTML = '<p>Inloggning misslyckades. Stäng fönstret och försök igen.</p>';
  }
</script>
</body>
</html>
