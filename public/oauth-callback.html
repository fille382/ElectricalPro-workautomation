<!DOCTYPE html>
<html>
<head><title>Loggar in...</title></head>
<body>
<p>Loggar in...</p>
<script>
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  var state = params.get('state');

  if (code) {
    // Store result in localStorage
    localStorage.setItem('pb_oauth_result', JSON.stringify({
      code: code,
      state: state
    }));
    // Redirect back to app root (same origin)
    // Handle both /oauth-callback.html and /oauth-callback (Cloudflare clean URLs)
    var path = window.location.pathname;
    var base = window.location.origin + path.replace(/\/oauth-callback(\.html)?$/, '/');
    console.log('[OAuth Callback] code received, redirecting to:', base + '#/');
    window.location.href = base + '#/';
  } else {
    document.body.innerHTML = '<p>Inloggning misslyckades. <a href="#/">Tillbaka</a></p>';
  }
</script>
</body>
</html>
